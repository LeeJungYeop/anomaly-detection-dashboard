<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Frontend - Image Upload</title>
  <style>
    #drop-zone {
      width: 300px;
      height: 200px;
      border: 2px dashed #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
      cursor: pointer;
    }
    #drop-zone.highlight {
      border-color: #007bff;
      background-color: #f8f9fa;
    }
    #preview img {
      max-width: 300px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>이미지 업로드 테스트</h1>

  <div id="drop-zone">이미지를 드래그하거나 클릭하여 선택하세요.</div>
  
  <input type="file" id="file-input" accept="image/*" style="display: none;">

  <div id="preview"></div>

  <button onclick="uploadImage()">백엔드로 전송</button>
  <pre id="result"></pre>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    let selectedFile = null;

    // 1. 드래그 앤 드롭 이벤트 처리
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('highlight');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('highlight');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('highlight');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });

    // 2. 클릭 시 파일 탐색기 열기
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    // 3. 파일 처리 및 미리보기 함수
    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('이미지 파일만 선택 가능합니다.');
        return;
      }
      selectedFile = file;

      const reader = new FileReader();
      reader.onload = (e) => {
        preview.innerHTML = `<img src="${e.target.result}" alt="미리보기">`;
      };
      reader.readAsDataURL(file);
    }

    // 4. 백엔드로 데이터 전송
    async function uploadImage() {  // uploadImage 함수는 브라우저에 있는 이미지 파일을 서버(백엔드)로 전송
      if (!selectedFile) {
        alert('파일을 먼저 선택해주세요.');
        return;
      }

      const formData = new FormData(); // 이미지 전송을 위해 설계된 특수 객체, Key-Value 쌍으로 데이터를 저장
      formData.append('image', selectedFile); // 'image'는 서버가 데이터를 식별할 변수명이고, selectedFile은 파일의 바이너리 데이터

      try {
        const res = await fetch("/api/upload", { // 브라우저는 formData를 multipart/form-data 형식으로 포장하여 서버 주소(/api/upload)로 보냅
                                                 // 네트워크 전송은 즉시 완료되지 않으므로, 서버로부터 응답 헤더(Response Header)가 도착할 때까지 이 라인에서 코드 실행을 일시 중단
          method: "POST",
          body: formData
        });
        const data = await res.json(); // 서버가 보낸 텍스트 데이터를 자바스크립트가 읽을 수 있는 객체(Object) 형태로 변환
        document.getElementById("result").innerText = JSON.stringify(data, null, 2); // 서버가 돌려준 정보(예: 저장된 이미지의 경로, 성공 메시지 등)를 문자열로 바꿈
      } catch (err) {
        console.error("전송 실패:", err);
      }
    }
  </script>
</body>
</html>
